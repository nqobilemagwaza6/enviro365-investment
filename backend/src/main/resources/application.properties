spring.application.name=enviro365-investment

spring.datasource.url=jdbc:h2:mem:envirodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

jwt.secret=Enviro365SecretKeyForJWTTokenGenerationMustBeLongEnough256Bits
jwt.expiration=86400000

logging.level.com.enviro.assessment.junior.nqobile=INFO
logging.level.org.springframework.security=WARN

server.port=8080
